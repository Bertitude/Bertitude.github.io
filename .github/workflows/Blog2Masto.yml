name: Blog2Masto
on:
  push:
    paths:
      - 'socs/_posts/*.md'

jobs:
  post:
    runs-on: ubuntu-latest        # <-- removed the if: line entirely
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        fetch-depth: 0

    - name: Get Commit SHA
      id: get_commit_sha
      run: |
        echo "sha=${{ github.sha }}" >> $GITHUB_ENV

    - name: Identify Added Blog Post
      id: identify_added_blog_post
      run: |
        sha=${{ env.sha }}
        post_file=$(git diff-tree --no-commit-id -r --name-only --diff-filter=A $sha | grep 'docs/_posts/.*\.md')

        if [ -n "$post_file" ]; then
          new_post_file=$(echo "$post_file" | head -n 1)

          title=$(awk '/^title:/ {$1=""; sub(/^[ \t]+/, ""); print}' "$new_post_file" | tr -d '"')
          date=$(echo "$new_post_file" | grep -oP '\d{4}-\d{2}-\d{2}' | sed 's/-/\//g')
          tags=$(awk '/^tags:/ {for (i=2; i<=NF; i++) print "#" $i}' "$new_post_file" | tr -d '[,]' | tr '\n' ' ')

          base_url="${{ secrets.BLOG_URL }}"
          url=$(echo "$title" | tr '[:upper:]' '[:lower:]' | tr -d '[:punct:]' | sed -E 's/[[:space:]]+/-/g' | sed -E 's/^-//;s/-$//')
          post_url="$base_url/$date/$url"

          echo "post_title=$title" >> $GITHUB_ENV
          echo "post_url=$post_url" >> $GITHUB_ENV
          echo "post_tags=$tags" >> $GITHUB_ENV
        fi
        
    - name: Debug Variables
      run: |
        echo "post_title=${{ env.post_title }}"
        echo "post_url=${{ env.post_url }}"
        echo "post_tags=${{ env.post_tags }}"
        echo "--- git diff-tree output ---"
        git diff-tree --no-commit-id -r --name-only --diff-filter=A ${{ env.sha }}
        echo "--- front matter of detected file ---"
        post_file=$(git diff-tree --no-commit-id -r --name-only --diff-filter=A ${{ env.sha }} | grep '_posts/.*\.md')
        echo "post_file=$post_file"
        if [ -n "$post_file" ]; then
          cat "$post_file"
        else
          echo "NO FILE DETECTED"
        fi
        
    - name: Post to Mastodon
      id: post_to_mastodon
      if: ${{ env.post_title != '' && env.post_url != '' }}
      uses: cbrgm/mastodon-github-action@v1.0.3
      with:
        message: |
          New blog: "${{ env.post_title }}"
          ${{ env.post_url }}

          ${{ env.post_tags }} #blog
        visibility: "public"
      env:
        MASTODON_URL: ${{ secrets.MASTODON_URL }}
        MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
